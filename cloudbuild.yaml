# gis-account-manager -> Project ID on GCP
steps:
  # Build the Docker image.
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-t', 'eu.gcr.io/$PROJECT_ID/docker-spa:$SHORT_SHA', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'eu.gcr.io/$PROJECT_ID/docker-spa:$SHORT_SHA']
